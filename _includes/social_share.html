<ul class="list-inline post-share text-md-right">
    <li class="list-inline-item"><h5>Share:</h5></li>
    <li class="list-inline-item">
        <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ site.url }}{{ site.baseurl }}{{ page.url }}"
        onclick="window.open(this.href, 'pop-up', 'left=20,top=20,width=600,height=520,toolbar=1,resizable=0'); return false;"
        title="Share on LinkedIn">
        <i class="ti-linkedin"></i>
        </a>
    </li>
</ul>
