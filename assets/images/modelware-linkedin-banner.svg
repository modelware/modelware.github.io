<svg xmlns="http://www.w3.org/2000/svg" width="1128" height="191" viewBox="0 0 1128 191" role="img" aria-label="Modelware — Democratizing MBSE">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1128" y2="191" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16233c"/>
      <stop offset="0.7" stop-color="#0a1322"/>
    </linearGradient>
    <radialGradient id="glow-tl" cx="0.10" cy="0.0" r="0.55">
      <stop offset="0" stop-color="#0fb9a8" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#0fb9a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-br" cx="0.92" cy="1.0" r="0.6">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0fb9a8"/>
      <stop offset="0.5" stop-color="#6ee7db"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0fb9a8" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#0fb9a8"/>
      <stop offset="0.8" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1128" height="191" fill="url(#bg)"/>
  <rect width="1128" height="191" fill="url(#glow-tl)"/>
  <rect width="1128" height="191" fill="url(#glow-br)"/>

  <!-- faint grid -->
  <g stroke="#6ee7db" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 48 H1128 M0 96 H1128 M0 144 H1128"/>
    <path d="M141 0 V191 M282 0 V191 M423 0 V191 M564 0 V191 M705 0 V191 M846 0 V191 M987 0 V191"/>
  </g>

  <!-- left constellation (kept faint; LinkedIn logo overlaps this corner) -->
  <g stroke="url(#edge)" stroke-opacity="0.25" stroke-width="1.5" fill="none">
    <path d="M40 150 L110 92 L185 128 L246 60 M110 92 L96 28 M185 128 L208 178"/>
  </g>
  <g fill-opacity="0.45">
    <circle cx="110" cy="92" r="4" fill="#0fb9a8"/>
    <circle cx="185" cy="128" r="4" fill="#6ee7db"/>
    <circle cx="246" cy="60" r="3.5" fill="#8b5cf6"/>
    <circle cx="96" cy="28" r="3" fill="#6ee7db"/>
    <circle cx="40" cy="150" r="3" fill="#0fb9a8"/>
    <circle cx="208" cy="178" r="3" fill="#8b5cf6"/>
  </g>

  <!-- right node-graph echoing the icon's "M" -->
  <g filter="url(#soft-glow)">
    <g stroke="url(#edge)" stroke-opacity="0.85" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M905 142 L905 52 L960 110 L1015 52 L1015 142"/>
    </g>
    <circle cx="905" cy="142" r="6" fill="#0fb9a8"/>
    <circle cx="905" cy="52" r="6" fill="#6ee7db"/>
    <circle cx="1015" cy="52" r="6" fill="#8b5cf6"/>
    <circle cx="1015" cy="142" r="6" fill="#8b5cf6"/>
    <circle cx="960" cy="110" r="7.5" fill="#ffffff"/>
    <circle cx="960" cy="110" r="7.5" stroke="url(#edge)" stroke-width="2.5" fill="none"/>
  </g>
  <!-- links trailing from the M graph -->
  <g stroke="url(#edge)" stroke-opacity="0.3" stroke-width="1.5" fill="none">
    <path d="M1015 52 L1072 30 M1015 142 L1078 160 M905 52 L852 32 M905 142 L850 164"/>
  </g>
  <g fill-opacity="0.5">
    <circle cx="1072" cy="30" r="3.5" fill="#8b5cf6"/>
    <circle cx="1078" cy="160" r="3.5" fill="#8b5cf6"/>
    <circle cx="852" cy="32" r="3.5" fill="#6ee7db"/>
    <circle cx="850" cy="164" r="3.5" fill="#0fb9a8"/>
  </g>

  <!-- wordmark + tagline (centered safe zone) -->
  <g text-anchor="middle" font-family="'Space Grotesk','Poppins',sans-serif">
    <text x="564" y="96" font-weight="700" font-size="58" fill="#ffffff" letter-spacing="1">modelware</text>
    <rect x="424" y="116" width="280" height="2.5" fill="url(#rule)"/>
    <text x="564" y="148" font-weight="600" font-size="16" letter-spacing="5" fill="#9aa7b8">INTELLIGENCE-CENTRIC ENGINEERING</text>
  </g>
</svg>
