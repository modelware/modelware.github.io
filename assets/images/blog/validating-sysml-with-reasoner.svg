<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="A description-logic reasoner validating a SysML model: a model graph feeds a reasoner core that emits consistency and inconsistency verdicts">
  <defs>
    <linearGradient id="rs-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16233c"/>
      <stop offset="0.8" stop-color="#0a1322"/>
    </linearGradient>
    <radialGradient id="rs-glow-l" cx="0.18" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#0fb9a8" stop-opacity="0.20"/>
      <stop offset="0.6" stop-color="#0fb9a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rs-glow-c" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.30"/>
      <stop offset="0.7" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="rs-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#rs-bg)"/>
  <rect width="800" height="500" fill="url(#rs-glow-l)"/>
  <rect width="800" height="500" fill="url(#rs-glow-c)"/>

  <!-- labels -->
  <text x="70" y="92" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="2" fill="#7f8ca3">SYSML MODEL</text>
  <text x="356" y="92" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="2" fill="#cdb8ff">DL REASONER</text>
  <text x="650" y="92" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="2" fill="#7f8ca3">VERDICT</text>

  <!-- model graph (left) -->
  <g stroke="#46597a" stroke-width="1.5" opacity="0.7" fill="none">
    <path d="M120 180 L210 150 M120 180 L150 280 M210 150 L250 250 M150 280 L250 250 M250 250 L230 350 M250 250 L150 280"/>
  </g>
  <g fill="#0fb9a8" filter="url(#rs-soft)">
    <circle cx="120" cy="180" r="9"/>
    <circle cx="210" cy="150" r="9"/>
    <circle cx="250" cy="250" r="10"/>
    <circle cx="150" cy="280" r="8"/>
    <circle cx="230" cy="350" r="8"/>
  </g>

  <!-- feed arrow into reasoner -->
  <path d="M285 250 L360 250" stroke="#5b6f93" stroke-width="2.5" fill="none" marker-end="url(#rs-arr)"/>
  <defs>
    <marker id="rs-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6ee7db"/>
    </marker>
    <marker id="rs-arr-p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- reasoner core (center hexagon) -->
  <g filter="url(#rs-soft)">
    <polygon points="430,180 490,215 490,285 430,320 370,285 370,215"
             fill="#1b2746" stroke="#8b5cf6" stroke-width="3"/>
  </g>
  <g stroke="#a78bfa" stroke-width="2" fill="none" opacity="0.9">
    <circle cx="430" cy="250" r="22"/>
    <path d="M430 228 V272 M408 250 H452"/>
  </g>

  <!-- output arrows -->
  <path d="M495 220 L585 175" stroke="#2f6e54" stroke-width="2.5" fill="none" marker-end="url(#rs-arr)"/>
  <path d="M495 280 L585 330" stroke="#6a3f4a" stroke-width="2.5" fill="none" marker-end="url(#rs-arr-p)"/>

  <!-- verdict: consistent (check) -->
  <g filter="url(#rs-soft)">
    <circle cx="630" cy="165" r="30" fill="#10261f" stroke="#0fb9a8" stroke-width="3"/>
  </g>
  <path d="M615 165 L626 177 L648 152" stroke="#6ee7db" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="630" y="222" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9fe7dd" text-anchor="middle">consistent</text>

  <!-- verdict: inconsistency (cross) -->
  <g filter="url(#rs-soft)">
    <circle cx="630" cy="340" r="30" fill="#2a1730" stroke="#a78bfa" stroke-width="3"/>
  </g>
  <path d="M617 327 L643 353 M643 327 L617 353" stroke="#c9b3ff" stroke-width="5" fill="none" stroke-linecap="round"/>
  <text x="630" y="397" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#cdb8ff" text-anchor="middle">inconsistency found</text>
</svg>
