<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="OML as a modeling layer on top of the OWL foundation">
  <defs>
    <linearGradient id="oo-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16233c"/>
      <stop offset="0.8" stop-color="#0a1322"/>
    </linearGradient>
    <radialGradient id="oo-glow-t" cx="0.2" cy="0.25" r="0.7">
      <stop offset="0" stop-color="#0fb9a8" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#0fb9a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="oo-glow-b" cx="0.8" cy="0.8" r="0.7">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.24"/>
      <stop offset="0.6" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="oo-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#oo-bg)"/>
  <rect width="800" height="500" fill="url(#oo-glow-t)"/>
  <rect width="800" height="500" fill="url(#oo-glow-b)"/>

  <!-- labels -->
  <text x="70" y="150" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="3" fill="#6ee7db">OML</text>
  <text x="70" y="360" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="3" fill="#a78bfa">OWL</text>
  <text x="70" y="172" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="2" fill="#7f8ca3">MODELING</text>
  <text x="70" y="382" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="2" fill="#7f8ca3">FOUNDATION</text>

  <!-- mapping lines: each OML node fans down to several OWL nodes -->
  <g stroke="#5566822" stroke-width="1.5" opacity="0.5">
    <path d="M300 175 L250 330 M300 175 L320 330 M300 175 L390 330" stroke="#46597a" fill="none"/>
    <path d="M430 175 L390 330 M430 175 L470 330 M430 175 L540 330" stroke="#46597a" fill="none"/>
    <path d="M560 175 L540 330 M560 175 L610 330 M560 175 L680 330" stroke="#46597a" fill="none"/>
  </g>

  <!-- OML modeling layer: few clean teal nodes -->
  <g stroke="#0fb9a8" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#oo-soft)">
    <path d="M300 175 H560"/>
  </g>
  <g filter="url(#oo-soft)">
    <circle cx="300" cy="175" r="11" fill="#0fb9a8"/>
    <circle cx="430" cy="175" r="11" fill="#6ee7db"/>
    <circle cx="560" cy="175" r="11" fill="#0fb9a8"/>
  </g>

  <!-- divider -->
  <path d="M120 255 H700" stroke="#2a3a52" stroke-width="1.5" stroke-dasharray="3 8" opacity="0.7"/>

  <!-- OWL foundation: denser purple lattice -->
  <g stroke="#5b4a8f" stroke-width="2" opacity="0.7" fill="none">
    <path d="M250 330 H680 M250 330 L320 330"/>
  </g>
  <g fill="#8b5cf6">
    <circle cx="250" cy="330" r="6.5"/>
    <circle cx="320" cy="330" r="6.5"/>
    <circle cx="390" cy="330" r="6.5"/>
    <circle cx="470" cy="330" r="6.5"/>
    <circle cx="540" cy="330" r="6.5"/>
    <circle cx="610" cy="330" r="6.5"/>
    <circle cx="680" cy="330" r="6.5"/>
  </g>
  <g fill="#a78bfa">
    <circle cx="285" cy="385" r="5"/>
    <circle cx="355" cy="385" r="5"/>
    <circle cx="430" cy="385" r="5"/>
    <circle cx="505" cy="385" r="5"/>
    <circle cx="575" cy="385" r="5"/>
    <circle cx="645" cy="385" r="5"/>
  </g>
  <g stroke="#5b4a8f" stroke-width="1.5" opacity="0.55" fill="none">
    <path d="M250 330 L285 385 M320 330 L355 385 M390 330 L430 385 M470 330 L505 385 M540 330 L575 385 M610 330 L645 385"/>
  </g>
</svg>
