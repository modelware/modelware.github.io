<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Declarative concept of operations verification: a goal-based knowledge graph formalized into temporal logic and checked against an operational timeline that is validated">
  <defs>
    <linearGradient id="cv-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16233c"/>
      <stop offset="0.8" stop-color="#0a1322"/>
    </linearGradient>
    <radialGradient id="cv-glow-l" cx="0.16" cy="0.28" r="0.7">
      <stop offset="0" stop-color="#0fb9a8" stop-opacity="0.20"/>
      <stop offset="0.6" stop-color="#0fb9a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cv-glow-c" cx="0.52" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.26"/>
      <stop offset="0.7" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="cv-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="cv-arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#6ee7db"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="url(#cv-bg)"/>
  <rect width="800" height="500" fill="url(#cv-glow-l)"/>
  <rect width="800" height="500" fill="url(#cv-glow-c)"/>

  <!-- section labels -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="2" fill="#7f8ca3">
    <text x="60"  y="92">GOAL GRAPH</text>
    <text x="330" y="92">FORMAL SPEC</text>
    <text x="612" y="92">TIMELINE V&amp;V</text>
  </g>

  <!-- left: goal-based knowledge graph -->
  <g stroke="#46597a" stroke-width="2" fill="none">
    <path d="M105 175 L170 145"/>
    <path d="M105 175 L150 245"/>
    <path d="M170 145 L235 215"/>
    <path d="M150 245 L235 215"/>
  </g>
  <g filter="url(#cv-soft)">
    <circle cx="105" cy="175" r="20" fill="#16233c" stroke="#0fb9a8" stroke-width="2"/>
    <circle cx="170" cy="145" r="15" fill="#101c33" stroke="#46597a" stroke-width="1.5"/>
    <circle cx="150" cy="245" r="15" fill="#101c33" stroke="#46597a" stroke-width="1.5"/>
    <circle cx="235" cy="215" r="15" fill="#101c33" stroke="#46597a" stroke-width="1.5"/>
  </g>
  <text x="105" y="180" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="bold">GOAL</text>

  <!-- arrow graph -> spec -->
  <path d="M262 200 L330 200" stroke="#5b6f93" stroke-width="2.5" fill="none" marker-end="url(#cv-arr)"/>

  <!-- center: FRETish -> LTL formal spec -->
  <g filter="url(#cv-soft)">
    <rect x="335" y="150" width="170" height="100" rx="12" fill="#16233c" stroke="#8b5cf6" stroke-width="2"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="420" y="186" font-size="14" fill="#dfe6f0">FRETish</text>
    <text x="420" y="208" font-size="13" fill="#6ee7db">&#8595;</text>
    <text x="420" y="230" font-size="14" fill="#dfe6f0" font-style="italic">LTL</text>
  </g>

  <!-- arrow spec -> timeline -->
  <path d="M512 200 L578 200" stroke="#5b6f93" stroke-width="2.5" fill="none" marker-end="url(#cv-arr)"/>

  <!-- right: operational timeline being checked -->
  <g filter="url(#cv-soft)">
    <rect x="585" y="135" width="170" height="130" rx="10" fill="#101c33" stroke="#2a3a52" stroke-width="1.5"/>
  </g>
  <g>
    <rect x="600" y="152" width="140" height="16" rx="3" fill="#0fb9a8" opacity="0.85"/>
    <rect x="615" y="178" width="110" height="16" rx="3" fill="#a78bfa" opacity="0.75"/>
    <rect x="600" y="204" width="95"  height="16" rx="3" fill="#6ee7db" opacity="0.8"/>
    <rect x="625" y="230" width="100" height="16" rx="3" fill="#0fb9a8" opacity="0.7"/>
  </g>

  <!-- valid verdict badge -->
  <g filter="url(#cv-soft)">
    <circle cx="745" cy="135" r="22" fill="#0fb9a8"/>
  </g>
  <path d="M735 135 L742 143 L757 126" stroke="#0a1322" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- iterate-back loop -->
  <path d="M670 280 C670 360, 200 360, 130 300" stroke="#0fb9a8" stroke-width="2" stroke-dasharray="3 7" fill="none" marker-end="url(#cv-arr)" opacity="0.8"/>
  <text x="400" y="352" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="2" fill="#6ee7db" text-anchor="middle">ITERATIVE STATE DISCOVERY &amp; V&amp;V</text>

  <!-- footer tag -->
  <text x="400" y="430" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="2" fill="#7f8ca3" text-anchor="middle">openCAESAR (OML) &#183; FRET (LTL)</text>
</svg>
