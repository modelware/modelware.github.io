<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Two kinds of upper ontology: inheritance, where classification flows down a single hierarchy, versus punning, where concepts are classified at a meta level">
  <defs>
    <linearGradient id="ip-bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16233c"/>
      <stop offset="0.8" stop-color="#0a1322"/>
    </linearGradient>
    <radialGradient id="ip-glow-l" cx="0.22" cy="0.25" r="0.65">
      <stop offset="0" stop-color="#0fb9a8" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#0fb9a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ip-glow-r" cx="0.8" cy="0.8" r="0.65">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.24"/>
      <stop offset="0.6" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="ip-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="ip-arrow-t" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0fb9a8"/>
    </marker>
    <marker id="ip-arrow-p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="url(#ip-bg)"/>
  <rect width="800" height="500" fill="url(#ip-glow-l)"/>
  <rect width="800" height="500" fill="url(#ip-glow-r)"/>

  <!-- center divider -->
  <path d="M400 70 V440" stroke="#2a3a52" stroke-width="1.5" stroke-dasharray="3 8" opacity="0.7"/>

  <!-- ===================== LEFT: INHERITANCE ===================== -->
  <text x="60" y="100" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="2" fill="#6ee7db">SUPERCLASS</text>
  <text x="60" y="122" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="2" fill="#7f8ca3">DOMAIN CLASSES INHERIT</text>

  <!-- single hierarchy, downward arrows -->
  <g stroke="#0fb9a8" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M200 178 V232" marker-end="url(#ip-arrow-t)"/>
    <path d="M200 268 V322" marker-end="url(#ip-arrow-t)"/>
    <path d="M200 358 V410" marker-end="url(#ip-arrow-t)"/>
  </g>

  <g filter="url(#ip-soft)">
    <circle cx="200" cy="160" r="12" fill="#0fb9a8"/>
    <circle cx="200" cy="250" r="11" fill="#6ee7db"/>
    <circle cx="200" cy="340" r="11" fill="#0fb9a8"/>
    <circle cx="200" cy="428" r="9" fill="#6ee7db"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#cdd6e4" text-anchor="start">
    <text x="222" y="165">PhysicalObject</text>
    <text x="222" y="255">Animal</text>
    <text x="222" y="345">Dog</text>
    <text x="222" y="433" fill="#9aa6b8">Fido</text>
  </g>

  <!-- ===================== RIGHT: PUNNING ===================== -->
  <text x="455" y="100" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="2" fill="#a78bfa">METACLASS</text>
  <text x="455" y="122" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="2" fill="#7f8ca3">DOMAIN CLASSES ARE INSTANCES</text>

  <!-- meta level row -->
  <g fill="#8b5cf6" filter="url(#ip-soft)">
    <circle cx="520" cy="170" r="10"/>
    <circle cx="660" cy="170" r="10"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#cdb8ff" text-anchor="middle">
    <text x="520" y="148">NaturalKind</text>
    <text x="660" y="148">Role</text>
  </g>

  <!-- instance-of arrows up to meta level -->
  <g stroke="#8b5cf6" stroke-width="2" fill="none" stroke-dasharray="2 6" opacity="0.85">
    <path d="M520 300 V184" marker-end="url(#ip-arrow-p)"/>
    <path d="M660 300 V184" marker-end="url(#ip-arrow-p)"/>
  </g>

  <!-- domain concept level (punned: class + individual) -->
  <g fill="#a78bfa" filter="url(#ip-soft)">
    <circle cx="520" cy="315" r="10"/>
    <circle cx="660" cy="315" r="10"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#cdd6e4" text-anchor="middle">
    <text x="520" y="346">Dog</text>
    <text x="660" y="346">Customer</text>
  </g>

  <!-- instance below Dog only -->
  <g stroke="#5b4a8f" stroke-width="2" fill="none" stroke-dasharray="2 6" opacity="0.7">
    <path d="M520 426 V330" marker-end="url(#ip-arrow-p)"/>
  </g>
  <circle cx="520" cy="430" r="8" fill="#6f5bbf"/>
  <text x="520" y="453" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9aa6b8" text-anchor="middle">Fido</text>
</svg>
