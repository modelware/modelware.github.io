<svg viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="320" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16233c"/>
      <stop offset="0.7" stop-color="#0a1322"/>
    </linearGradient>
    <radialGradient id="glow-tl" cx="0.18" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#0fb9a8" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#0fb9a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-br" cx="0.88" cy="0.9" r="0.95">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="76" y1="76" x2="244" y2="244" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0fb9a8"/>
      <stop offset="0.55" stop-color="#6ee7db"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="2" y="2" width="316" height="316" rx="70" fill="url(#tile)"/>
  <rect x="2" y="2" width="316" height="316" rx="70" fill="url(#glow-tl)"/>
  <rect x="2" y="2" width="316" height="316" rx="70" fill="url(#glow-br)"/>
  <rect x="3.5" y="3.5" width="313" height="313" rx="68.5" stroke="#6ee7db" stroke-opacity="0.22" stroke-width="3"/>

  <!-- ontology-graph "O": hexagonal ring of nodes with grounded center -->
  <g transform="translate(60 60) scale(1)">
    <g stroke="url(#edge)" stroke-width="6" filter="url(#glow)">
      <path d="M100 22 L167 61 L167 139 L100 178 L33 139 L33 61 Z"/>
      <path d="M100 22 L100 100 M167 139 L100 100 M33 139 L100 100" opacity="0.55"/>
    </g>
    <g filter="url(#glow)">
      <circle cx="100" cy="22"  r="11" fill="#6ee7db"/>
      <circle cx="167" cy="61"  r="11" fill="#0fb9a8"/>
      <circle cx="167" cy="139" r="11" fill="#8b5cf6"/>
      <circle cx="100" cy="178" r="11" fill="#0fb9a8"/>
      <circle cx="33"  cy="139" r="11" fill="#8b5cf6"/>
      <circle cx="33"  cy="61"  r="11" fill="#0fb9a8"/>
      <circle cx="100" cy="100" r="15" fill="#ffffff"/>
      <circle cx="100" cy="100" r="15" stroke="url(#edge)" stroke-width="5" fill="none"/>
    </g>
  </g>
</svg>
