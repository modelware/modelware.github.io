<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="OML Code: Logic, AI, DevOps">
  <defs>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13303a"/>
      <stop offset="0.55" stop-color="#101a2e"/>
      <stop offset="1" stop-color="#241b3e"/>
    </linearGradient>
    <linearGradient id="wireGrad" x1="0" y1="116" x2="0" y2="376" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2de0c8"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="640" y1="0" x2="1010" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0fb9a8"/>
      <stop offset="0.55" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon badge -->
  <g transform="translate(32,24)">
    <rect width="272" height="272" rx="60" fill="url(#badgeGrad)"/>
    <!-- isometric node-cube wireframe -->
    <g transform="translate(136,136) scale(0.53)" filter="url(#glow)">
      <g stroke="url(#wireGrad)" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" fill="none"
         transform="translate(-256,-256)">
        <!-- hexagon perimeter -->
        <path d="M256 116 L368 181 L368 311 L256 376 L144 311 L144 181 Z"/>
        <!-- spokes to center -->
        <path d="M256 116 L256 246 M144 311 L256 246 M368 311 L256 246"/>
      </g>
      <!-- vertex nodes -->
      <g transform="translate(-256,-256)">
        <circle cx="256" cy="116" r="20" fill="#2de0c8"/>
        <circle cx="368" cy="181" r="20" fill="#2de0c8"/>
        <circle cx="144" cy="181" r="20" fill="#2de0c8"/>
        <circle cx="368" cy="311" r="20" fill="#8b5cf6"/>
        <circle cx="144" cy="311" r="20" fill="#8b5cf6"/>
        <circle cx="256" cy="376" r="20" fill="#2de0c8"/>
        <!-- center node -->
        <circle cx="256" cy="246" r="26" fill="#ffffff" stroke="#2de0c8" stroke-width="10"/>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="348" y="178" font-family="'Space Grotesk','Poppins',sans-serif" font-weight="700" font-size="148" fill="#ffffff">OML <tspan fill="url(#codeGrad)">Code</tspan></text>

  <!-- Tagline -->
  <text x="352" y="248" font-family="'Space Grotesk','Poppins',sans-serif" font-weight="600" font-size="30" letter-spacing="12" fill="#9aa7b8">LOGIC <tspan fill="#0fb9a8">·</tspan> AI <tspan fill="#0fb9a8">·</tspan> DEVOPS</text>
</svg>
